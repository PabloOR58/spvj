version: "3.9"

services:
  web:
    build: .
    container_name: infosteam_web
    restart: always
    ports:
      - "8501:8501"
    volumes:
      - ./:/app  # Vincula tu carpeta local con el contenedor
    environment:
      - PYTHONUNBUFFERED=1
    command: ["streamlit", "run", "Web/app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]

  downloader:
    build: .
    container_name: infosteam_downloader
    restart: always
    depends_on:
      - web
    volumes:
      - ./:/app  # Vincula tu carpeta local para que el CSV aparezca en tu PC
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      bash -c "while true; do 
      echo 'Iniciando descarga diaria...';
      python /app/Src/download.py; 
      echo 'Descarga finalizada. Esperando 24 horas...';
      sleep 86400; 
      done"